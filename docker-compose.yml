###############################################################
# COMMON CONFIGURATION
###############################################################
x-db-credentials: &db-credentials
  POSTGRES_USER: mikrotik
  POSTGRES_PASSWORD: TolongGanti
  POSTGRES_DB: mikrotik_db

x-app-credentials: &app-credentials
  DATABASE_URL: postgresql://mikrotik:TolongGanti@db:5432/mikrotik_db?schema=public
  SESSION_SECRET: TolongGanti # Run: openssl rand -hex 32

x-app-ports: &app-ports
  - "3000:3000" # HOST -> app (3000)
###############################################################

x-common-config: &common-config
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  app:
    <<: *common-config
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mikrotik_academy_app
    ports:
      <<: *app-ports
    environment:
      <<: *app-credentials
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

  db:
    <<: *common-config
    image: postgres:17-alpine
    container_name: mikrotik_academy_db
    environment:
      <<: *db-credentials
    ports:
      - "5432:5432"
    volumes:
      # Map postgres data so the database persists across container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mikrotik -d mikrotik_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
